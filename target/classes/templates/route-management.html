<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Route Management</title>
        <link rel="stylesheet" href="assets/css/bulma.min.css" />
        <link rel="stylesheet" href="assets/css/all.min.css" />
        <link rel="stylesheet" href="assets/css/style.css" />
    </head>
    <body>
        <section class="section has-background-info pt-3 pb-3">
            <div class="container">
                <div
                    class="is-flex is-justify-content-space-between is-align-items-center"
                >
                    <p class="has-text-weight-bold has-text-white">LOGO</p>
                    <a href="/logout">
                        <button class="button is-small is-warning">
                            <strong>Logout</strong>
                        </button>
                    </a>
                </div>
            </div>
        </section>

        <section class="section pt-3 pb-3">
            <div class="container">
                <p class="is-size-5 has-text-weight-bold pt-3 pb-3">
                    Admin dashboard
                </p>
            </div>
        </section>

        <section class="section pt-0 pb-0">
            <div class="container">
                <div class="tabs is-boxed">
                    <ul>
                        <li>
                            <a href="dashboard.html">
                                <span class="icon is-small"
                                    ><i
                                        class="fas fa-chart-column"
                                        aria-hidden="true"
                                    ></i
                                ></span>
                                <span>Season Analysis</span>
                            </a>
                        </li>
                        <li class="is-active">
                            <a>
                                <span class="icon is-small"
                                    ><i
                                        class="fas fa-location-arrow"
                                        aria-hidden="true"
                                    ></i
                                ></span>
                                <span>Route</span>
                            </a>
                        </li>
                        <li>
                            <a href="department-mangement.html">
                                <span class="icon is-small"
                                    ><i
                                        class="fas fa-building-columns"
                                        aria-hidden="true"
                                    ></i
                                ></span>
                                <span>Department</span>
                            </a>
                        </li>
                        <li>
                            <a href="season-management.html">
                                <span class="icon is-small"
                                    ><i
                                        class="fas fa-circle-dot"
                                        aria-hidden="true"
                                    ></i
                                ></span>
                                <span>Season</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </section>

        <section class="section pt-3 pb-3">
            <div
                class="container is-flex is-justify-content-space-between is-align-items-center"
            >
                <p class="is-size-5 has-text-weight-semibold pt-3 pb-3">
                    Route Management
                </p>
                <button class="button is-small is-success">
                    <span class="icon is-small">
                        <i class="fas fa-add"></i>
                    </span>
                    <span>Create route</span>
                </button>
            </div>
        </section>

        <section class="section pt-3 pb-3">
            <div class="container">
                <div class="table-container">
                    <table class="table is-fullwidth">
                        <thead>
                            <tr>
                                <th>S.No.</th>
                                <th>Route No.</th>
                                <th>Route Name</th>
                                <th>Date</th>
                                <th>Update</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>1</td>
                                <td>15</td>
                                <td>Salem</td>
                                <td>23/04/2023</td>
                                <td>
                                    <button
                                        data-target="modal-js-example"
                                        class="button js-modal-trigger is-small has-text-weight-bold is-warning"
                                    >
                                        update
                                    </button>
                                </td>
                                <td>
                                    <button
                                        data-target="modal-js-example"
                                        class="button is-small has-text-weight-bold is-danger js-modal-trigger"
                                    >
                                        delete
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
        <div id="delete-modal" class="modal">
            <div class="modal-background"></div>
            <div class="card">
                <header class="card-header">
                    <p class="card-header-title">Confirmation</p>
                    <button class="card-header-icon" aria-label="more options">
                        <span class="icon">
                            <i
                                class="fas fa-window-close"
                                aria-hidden="true"
                            ></i>
                        </span>
                    </button>
                </header>
                <div class="card-content">
                    <div class="content pr-6">Are you sure to delete?</div>
                </div>
                <footer class="card-footer">
                    <a href="#" class="card-footer-item"
                        ><button class="button is-warning is-fullwidth">
                            Cancel
                        </button>
                    </a>
                    <a href="#" class="card-footer-item"
                        ><button class="button is-danger is-fullwidth">
                            Delete
                        </button></a
                    >
                </footer>
            </div>
        </div>
        <div id="create-route-modal" class="modal">
            <div class="modal-background"></div>
            <div class="card">
                <header class="card-header">
                    <p class="card-header-title">Create season</p>
                    <button class="card-header-icon" aria-label="more options">
                        <span class="icon">
                            <i
                                class="fas fa-window-close"
                                aria-hidden="true"
                            ></i>
                        </span>
                    </button>
                </header>
                <div class="card-content">
                    <div class="content">
                        <form action="#">
                            <div class="field">
                                <label class="label">Route No.</label>
                                <div class="control">
                                    <input
                                        class="input"
                                        type="text"
                                        placeholder="Bus route no."
                                        name="routeNo"
                                        required
                                    />
                                </div>
                            </div>
                            <div class="field">
                                <label class="label">Route Name</label>
                                <div class="control">
                                    <input
                                        class="input"
                                        type="text"
                                        placeholder="Last stop"
                                        name="routename"
                                        required
                                    />
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <footer class="card-footer">
                    <a href="#" class="card-footer-item"
                        ><button class="button is-warning is-fullwidth">
                            Cancel
                        </button>
                    </a>
                    <a href="#" class="card-footer-item"
                        ><button class="button is-danger is-fullwidth">
                            Create
                        </button></a
                    >
                </footer>
            </div>
        </div>
        <script></script>
    </body>
</html>
